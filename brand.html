<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trusted By</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
    }

    .trusted-section {
      text-align: center;
      padding: 40px 60px;
      width: 100%;
      max-width: 1400px;
    }

    .trusted-section p {
      color: #aaaaaa;
      font-size: 14px;
      letter-spacing: 0.3px;
      margin-bottom: 28px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .logo-grid {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .logo-card {
      background-color: #242424;
      border: 1px solid #333333;
      border-radius: 8px;
      width: 170px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s ease, background-color 0.2s ease;
      cursor: default;
    }

    .logo-card:hover {
      border-color: #555;
      background-color: #2c2c2c;
    }

    .logo-card span {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .logo-card span .icon {
      font-size: 18px;
    }

    /* Individual brand styles */
    .stripe span   { font-style: italic; letter-spacing: -1px; }
    .openai span   { font-weight: 500; }
    .adobe span    { font-weight: 700; letter-spacing: 1px; }
    .nvidia span   { font-weight: 700; letter-spacing: 1px; }
    .figma span    { font-weight: 400; letter-spacing: 0; }
    .ramp span     { font-weight: 500; }
    .datadog span  { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .linear span   { font-weight: 500; }
  </style>
</head>
<body>
  <section class="trusted-section">
    <p>Trusted every day by teams that build world-class software</p>
    <div class="logo-grid">
      <div class="logo-card stripe">
        <span>stripe</span>
      </div>
      <div class="logo-card openai">
        <span>OpenAI</span>
      </div>
      <div class="logo-card linear">
        <span><svg width="18" height="18" viewBox="0 0 100 100" fill="white"><path d="M5 50 L50 5 L95 50 L50 95 Z"/></svg> Linear</span>
      </div>
      <div class="logo-card datadog">
        <span>🐶 DATADOG</span>
      </div>
      <div class="logo-card nvidia">
        <span>⊛ NVIDIA.</span>
      </div>
      <div class="logo-card figma">
        <span>Figma</span>
      </div>
      <div class="logo-card ramp">
        <span>ramp ↗</span>
      </div>
      <div class="logo-card adobe">
        <span>Adobe</span>
      </div>
    </div>
  </section>
</body>
</html>
